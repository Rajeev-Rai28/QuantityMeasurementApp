
# Application Configuration Properties
spring.application.name=Quantity Measurement App
server.port=8080

# H2 Database (In-Memory for Development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true



security.jwt.secret=your-secret-key-here-make-it-long-and-secure-at-least-256-bits
security.jwt.access-token-expiration=86400000
security.jwt.refresh-token-expiration=604800000


